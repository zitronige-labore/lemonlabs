name: CI

on:
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: symptom-navigator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: symptom-navigator/package-lock.json

      - name: Dependencies installieren
        run: npm ci

      - name: Tests ausführen
        run: npm test
        env:
          NODE_ENV: test

      - name: Coverage-Report speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: symptom-navigator/coverage/
